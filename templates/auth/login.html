{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">

                    Iniciar Sesión

                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Contraseña</label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            required>

                    </div>

                    <button
                        class="btn btn-primary w-100">

                        Iniciar Sesión

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
