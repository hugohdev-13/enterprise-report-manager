{% extends "base.html" %}

{% block title %}{{ form_title }} | Enterprise Report Manager{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <span class="page-kicker">Reports</span>
        <h2>{{ form_title }}</h2>
        <p>Create or update report information.</p>
    </div>
    <a href="{{ url_for('reports.list_reports') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i> Back to reports
    </a>
</div>

<div class="card form-card">
    <div class="card-body p-4 p-lg-5">
        <form method="post" novalidate>
            <div class="mb-4">
                <label for="name" class="form-label">Report name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control form-control-lg"
                    value="{{ form_data.get('name', '') }}"
                    maxlength="100"
                    placeholder="Example: Monthly sales report"
                    required
                    autofocus
                >
                <div class="form-text">Use a clear, descriptive name (maximum 100 characters).</div>
            </div>

            <div class="mb-4">
                <label for="format" class="form-label">Format</label>
                <select id="format" name="format" class="form-select form-select-lg" required>
                    {% for report_format in formats %}
                        <option
                            value="{{ report_format }}"
                            {{ 'selected' if form_data.get('format') == report_format else '' }}
                        >
                            {{ report_format }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <a href="{{ url_for('reports.list_reports') }}" class="btn btn-light">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i> {{ submit_label }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
